<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Reset · 分帳記帳簿</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: #f9fafb;
            color: #111;
        }
        .card {
            width: 100%; max-width: 28rem;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.75rem 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,.06);
        }
        h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .25rem; }
        .sub { color: #6b7280; font-size: .875rem; margin-bottom: 1.25rem; line-height: 1.5; }
        .step { display: flex; gap: .75rem; align-items: flex-start; padding: .625rem 0; border-top: 1px solid #f3f4f6; font-size: .9rem; }
        .step:first-of-type { border-top: 0; }
        .step .num {
            flex: none; width: 1.5rem; height: 1.5rem; border-radius: 50%;
            background: #e5e7eb; color: #111; display: grid; place-items: center;
            font-size: .8rem; font-weight: 600;
        }
        .step.done .num { background: #d1fae5; color: #065f46; }
        .step.done .text { color: #6b7280; text-decoration: line-through; }
        .btn {
            display: block; width: 100%; margin-top: 1.25rem;
            padding: .75rem 1rem; border-radius: .75rem; border: 0;
            background: #0d9488; color: #fff; font-size: 1rem; font-weight: 600;
            cursor: pointer; touch-action: manipulation;
        }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn.secondary { background: #e5e7eb; color: #111; margin-top: .5rem; }
        .log {
            margin-top: 1rem; max-height: 12rem; overflow: auto;
            background: #0b1020; color: #d1d5db;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: .75rem; line-height: 1.5;
            padding: .75rem; border-radius: .5rem; white-space: pre-wrap; word-break: break-all;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>🧹 重置瀏覽器狀態</h1>
        <p class="sub">
            把已註冊的 Service Worker、Cache Storage、本機資料全部清掉。<br>
            跑完就可以回到 <a href="/">主頁</a>。
        </p>

        <div class="step" id="step-sw">
            <span class="num">1</span>
            <span class="text">解除所有 Service Worker 註冊</span>
        </div>
        <div class="step" id="step-caches">
            <span class="num">2</span>
            <span class="text">清空所有 Cache Storage</span>
        </div>
        <div class="step" id="step-storage">
            <span class="num">3</span>
            <span class="text">清掉 localStorage / sessionStorage</span>
        </div>
        <div class="step" id="step-reload">
            <span class="num">4</span>
            <span class="text">重新載入頁面</span>
        </div>

        <button class="btn" id="go">開始清理</button>
        <a class="btn secondary" href="/">← 先回主頁</a>

        <pre class="log" id="log" hidden></pre>
    </main>

    <script>
        (function () {
            const $ = (s) => document.getElementById(s);
            const log = $('log');
            const lines = [];
            const add = (msg) => {
                lines.push(msg);
                log.hidden = false;
                log.textContent = lines.join('\n');
                log.scrollTop = log.scrollHeight;
                console.log('[reset]', msg);
            };
            const mark = (id) => $(id).classList.add('done');

            $('go').addEventListener('click', async () => {
                $('go').disabled = true;
                add('開始清理…');

                // 1. Unregister all Service Workers
                try {
                    if ('serviceWorker' in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        add(`找到 ${regs.length} 個 SW 註冊`);
                        for (const r of regs) {
                            const scope = r.scope;
                            const ok = await r.unregister();
                            add(`  - unregister(${scope}) → ${ok ? 'OK' : 'FAILED'}`);
                        }
                        mark('step-sw');
                    } else {
                        add('瀏覽器不支援 ServiceWorker API');
                        mark('step-sw');
                    }
                } catch (e) {
                    add('SW unregister 失敗：' + e.message);
                }

                // 2. Clear Cache Storage
                try {
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        add(`找到 ${keys.length} 個 cache`);
                        for (const k of keys) {
                            const ok = await caches.delete(k);
                            add(`  - delete(${k}) → ${ok ? 'OK' : 'FAILED'}`);
                        }
                        mark('step-caches');
                    } else {
                        add('瀏覽器不支援 CacheStorage API');
                        mark('step-caches');
                    }
                } catch (e) {
                    add('cache 清除失敗：' + e.message);
                }

                // 3. Clear localStorage / sessionStorage
                try {
                    const lsLen = localStorage.length;
                    const ssLen = sessionStorage.length;
                    localStorage.clear();
                    sessionStorage.clear();
                    add(`localStorage 清掉 ${lsLen} 個 key`);
                    add(`sessionStorage 清掉 ${ssLen} 個 key`);
                    mark('step-storage');
                } catch (e) {
                    add('storage 清除失敗：' + e.message);
                }

                add('');
                add('✅ 清理完成。2 秒後重整…');
                setTimeout(() => location.replace('/?reset=' + Date.now()), 2000);
            });
        })();
    </script>
</body>
</html>
